<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do vs Make: Collocation Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-do: #0ea5e9;
            --color-make: #ec4899;
            --color-wrong: #ef4444;
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* The 3D Flying Card */
        .card-3d {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s, border-color 0.3s;
            transform-style: preserve-3d;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-20px) rotate(-3deg); }
            50% { transform: translateX(20px) rotate(3deg); }
            75% { transform: translateX(-20px); }
        }

        .animate-shake {
            animation: shake 0.4s ease-in-out;
            border-color: var(--color-wrong) !important;
            color: var(--color-wrong) !important;
        }

        /* Correct Answer Indicator */
        .correct-tick {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 6rem;
            color: #22c55e;
            pointer-events: none;
            z-index: 50;
            text-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-tick {
            transform: translate(-50%, -50%) scale(1.5);
        }

        .drop-zone {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100px) scale(0.5); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .word-entrance {
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8">

    <!-- Header & Score -->
    <div class="w-full max-w-5xl flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl md:text-4xl font-800 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-pink-500 tracking-tight">
                COLLOCATION QUEST
            </h1>
            <p class="text-slate-400 text-sm md:text-base">Do vs Make: The 3D Challenge</p>
        </div>
        <div class="glass-panel px-6 py-3 flex items-center gap-4">
            <div class="text-center">
                <p class="text-[10px] uppercase tracking-widest text-slate-400">Score</p>
                <p id="score" class="text-2xl font-bold">0</p>
            </div>
            <div class="h-8 w-[1px] bg-slate-700"></div>
            <div class="text-center">
                <p id="streak-label" class="text-[10px] uppercase tracking-widest text-slate-400">Streak</p>
                <p id="streak" class="text-2xl font-bold text-yellow-400">0</p>
            </div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="relative w-full max-w-6xl flex-1 flex flex-col md:flex-row items-center justify-around gap-8 my-8">
        
        <!-- DO Zone -->
        <div id="zone-do" class="drop-zone glass-panel w-full md:w-1/3 h-48 md:h-80 flex flex-col items-center justify-center border-b-4 border-sky-500 group cursor-pointer" onclick="handleChoice('do')">
            <div id="tick-do" class="correct-tick">✓</div>
            <div class="absolute top-4 left-4 text-sky-500/10 font-800 text-6xl select-none">DO</div>
            <div class="text-sky-400 text-5xl md:text-7xl mb-4 group-hover:scale-110 transition-transform">⚙️</div>
            <h2 class="text-3xl md:text-4xl font-bold text-sky-400">DO</h2>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.2em] font-semibold">Activities & Tasks</p>
        </div>

        <!-- Word Display (The Centerpiece) -->
        <div id="word-container" class="relative z-20 w-full md:w-auto flex flex-col items-center">
            <div id="current-word-card" class="card-3d glass-panel px-10 py-10 md:px-20 md:py-16 flex items-center justify-center min-w-[300px] text-center border-t border-white/20 shadow-[0_0_60px_rgba(255,255,255,0.1)]">
                <span id="current-phrase" class="text-3xl md:text-5xl font-800 tracking-tight">Ready?</span>
            </div>
            
            <!-- Mobile Buttons -->
            <div class="mt-8 flex gap-4 md:hidden w-full px-4">
                <button onclick="handleChoice('do')" class="flex-1 py-5 bg-sky-600 rounded-2xl font-bold text-2xl active:scale-90 transition-transform shadow-xl">DO</button>
                <button onclick="handleChoice('make')" class="flex-1 py-5 bg-pink-600 rounded-2xl font-bold text-2xl active:scale-90 transition-transform shadow-xl">MAKE</button>
            </div>
            <p id="hint" class="mt-6 text-slate-500 animate-pulse text-sm font-medium uppercase tracking-widest">Arrow Keys to play</p>
        </div>

        <!-- MAKE Zone -->
        <div id="zone-make" class="drop-zone glass-panel w-full md:w-1/3 h-48 md:h-80 flex flex-col items-center justify-center border-b-4 border-pink-500 group cursor-pointer" onclick="handleChoice('make')">
            <div id="tick-make" class="correct-tick">✓</div>
            <div class="absolute top-4 right-4 text-pink-500/10 font-800 text-6xl select-none text-right">MAKE</div>
            <div class="text-pink-400 text-5xl md:text-7xl mb-4 group-hover:scale-110 transition-transform">✨</div>
            <h2 class="text-3xl md:text-4xl font-bold text-pink-400">MAKE</h2>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.2em] font-semibold">Creating & Resulting</p>
        </div>

    </div>

    <!-- Progress -->
    <div class="w-full max-w-5xl mb-6 px-4">
        <div class="flex justify-between mb-2 text-xs text-slate-400 font-bold uppercase tracking-widest">
            <span>Progress</span>
            <span id="progress-text">0 / 28</span>
        </div>
        <div class="w-full h-3 bg-slate-800/50 rounded-full overflow-hidden border border-white/5">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-sky-500 via-purple-500 to-pink-500 transition-all duration-700" style="width: 0%"></div>
        </div>
    </div>

    <!-- Results Overlay -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/98 backdrop-blur-2xl flex items-center justify-center z-50 hidden p-4">
        <div class="glass-panel w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden border-white/10 shadow-2xl">
            <div class="p-10 text-center border-b border-white/10 bg-gradient-to-b from-white/5 to-transparent">
                <h2 id="overlay-title" class="text-5xl font-800 mb-2 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-pink-500">Excellence!</h2>
                <p class="text-slate-400 text-lg">Your final score: <span id="final-score" class="text-yellow-400 font-bold text-3xl ml-2">0</span></p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-green-500/5 p-6 rounded-3xl border border-green-500/20">
                    <h3 class="text-green-400 font-800 text-xl mb-4 flex items-center gap-3">
                        <span class="text-2xl">🏆</span> Mastered
                    </h3>
                    <ul id="list-correct" class="space-y-3 text-base text-slate-300 font-medium"></ul>
                </div>
                <div class="bg-red-500/5 p-6 rounded-3xl border border-red-500/20">
                    <h3 class="text-red-400 font-800 text-xl mb-4 flex items-center gap-3">
                        <span class="text-2xl">🎯</span> Try Again
                    </h3>
                    <ul id="list-incorrect" class="space-y-3 text-base text-slate-300 font-medium"></ul>
                </div>
            </div>

            <div class="p-8 text-center bg-white/5">
                <button onclick="resetGame()" class="px-14 py-5 bg-gradient-to-r from-sky-500 to-pink-500 text-white rounded-full font-800 text-xl hover:scale-105 active:scale-95 transition-all shadow-[0_10px_40px_rgba(236,72,153,0.3)]">
                    RESTART QUEST
                </button>
            </div>
        </div>
    </div>

    <script>
        const collocations = [
            { phrase: "the cooking", verb: "do" }, { phrase: "an arrangement", verb: "make" },
            { phrase: "a cake", verb: "make" }, { phrase: "a suggestion", verb: "make" },
            { phrase: "a booking", verb: "make" }, { phrase: "the washing-up", verb: "do" },
            { phrase: "nothing", verb: "do" }, { phrase: "a mess", verb: "make" },
            { phrase: "your best", verb: "do" }, { phrase: "decorations", verb: "make" },
            { phrase: "a lot of noise", verb: "make" }, { phrase: "the cleaning", verb: "do" },
            { phrase: "something", verb: "do" }, { phrase: "some work", verb: "do" },
            { phrase: "a mistake", verb: "make" }, { phrase: "people happy", verb: "make" },
            { phrase: "friends", verb: "make" }, { phrase: "everything", verb: "do" },
            { phrase: "a promise", verb: "make" }, { phrase: "a note", verb: "make" },
            { phrase: "it fun", verb: "make" }, { phrase: "progress", verb: "make" },
            { phrase: "it work", verb: "make" }, { phrase: "a phone call", verb: "make" },
            { phrase: "a decision", verb: "make" }, { phrase: "coffee", verb: "make" },
            { phrase: "it happen", verb: "make" }, { phrase: "a difference", verb: "make" }
        ];

        let gameQueue = [];
        let score = 0;
        let streak = 0;
        let currentIndex = 0;
        let isProcessing = false;
        let results = { correct: [], incorrect: [] };

        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(783.99, audioCtx.currentTime + 0.1); // G5
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, audioCtx.currentTime); // A2
                osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.4); // A1
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function initGame() {
            gameQueue = [...collocations].sort(() => Math.random() - 0.5);
            score = 0; streak = 0; currentIndex = 0;
            results = { correct: [], incorrect: [] };
            updateUI();
            showNextWord();
            document.getElementById('overlay').classList.add('hidden');
        }

        function showNextWord() {
            if (currentIndex >= gameQueue.length) {
                endGame();
                return;
            }
            const card = document.getElementById('current-word-card');
            const text = document.getElementById('current-phrase');
            card.classList.remove('word-entrance', 'animate-shake');
            void card.offsetWidth; // Reflow
            card.classList.add('word-entrance');
            card.style.opacity = '1';
            card.style.transform = '';
            text.innerText = gameQueue[currentIndex].phrase;
            isProcessing = false;
        }

        function handleChoice(choice) {
            if (isProcessing || currentIndex >= gameQueue.length) return;
            isProcessing = true;

            const item = gameQueue[currentIndex];
            const correctVerb = item.verb;
            const card = document.getElementById('current-word-card');
            const zone = document.getElementById(`zone-${choice}`);

            if (choice === correctVerb) {
                // CORRECT ANIMATION
                score += 10 + (streak * 5);
                streak++;
                results.correct.push(item);
                zone.style.background = choice === 'do' ? 'rgba(14, 165, 233, 0.3)' : 'rgba(236, 72, 153, 0.3)';
                createParticles(choice);
                playSfx('correct');
                
                // Fly away fast
                const direction = choice === 'do' ? -600 : 600;
                card.style.transform = `translateX(${direction}px) scale(0.2) rotate(${direction/5}deg)`;
                card.style.opacity = '0';
                
                setTimeout(() => {
                    zone.style.background = '';
                    currentIndex++;
                    updateUI();
                    showNextWord();
                }, 400);
            } else {
                // WRONG ANIMATION
                streak = 0;
                results.incorrect.push(item);
                playSfx('wrong');
                card.classList.add('animate-shake');
                
                // Reveal correct zone
                const tick = document.getElementById(`tick-${correctVerb}`);
                tick.classList.add('show-tick');

                setTimeout(() => {
                    tick.classList.remove('show-tick');
                    // Fly away after showing correct answer
                    const direction = choice === 'do' ? -600 : 600;
                    card.style.transform = `translateX(${direction}px) scale(0) rotate(${direction/5}deg)`;
                    card.style.opacity = '0';
                    
                    setTimeout(() => {
                        currentIndex++;
                        updateUI();
                        showNextWord();
                    }, 300);
                }, 1200);
            }
        }

        function createParticles(type) {
            const color = type === 'do' ? '#0ea5e9' : '#ec4899';
            const zone = document.getElementById(`zone-${type}`);
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 10 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.backgroundColor = color;
                p.style.left = '50%'; p.style.top = '50%';
                p.style.boxShadow = `0 0 15px ${color}`;
                zone.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(${-50 + Math.cos(angle) * dist}px, ${-50 + Math.sin(angle) * dist}px) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => p.remove();
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            const progress = (currentIndex / gameQueue.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${currentIndex} / ${gameQueue.length}`;
        }

        function endGame() {
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            const correctList = document.getElementById('list-correct');
            const incorrectList = document.getElementById('list-incorrect');
            
            correctList.innerHTML = results.correct.map(i => `<li><span class="text-sky-400 opacity-60">#</span> ${i.phrase}</li>`).join('');
            incorrectList.innerHTML = results.incorrect.map(i => `<li><span class="text-pink-500 font-bold uppercase text-[10px] mr-2">${i.verb}</span> ${i.phrase}</li>`).join('');
            
            document.getElementById('overlay-title').innerText = results.incorrect.length === 0 ? "Perfect Mastery!" : "Quest Complete!";
        }

        function resetGame() { initGame(); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') handleChoice('do');
            if (e.key === 'ArrowRight') handleChoice('make');
        });

        window.onload = initGame;
    </script>
</body>
</html>
